[tox]
envlist =
    lint
    py310-dj42-wt63
    py311-dj{42,51}-wt70
    py312-dj{42,51,52}-wt72
    py313-dj{42,51,52}-wt73
    py314-dj52-wt73

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

[testenv]
basepython =
    py310: python3.10
    py311: python3.11
    py312: python3.12
    py313: python3.13
    py314: python3.14
commands = coverage run --parallel -m pytest -rs {posargs}
extras = test
deps =
    dj42: Django>=4.2,<4.3
    dj51: Django>=5.1,<5.2
    dj52: Django>=5.2,<5.3
    wt63: wagtail>=6.3,<6.4
    wt70: wagtail>=7.0,<7.1
    wt72: wagtail>=7.2,<7.3
    wt73: wagtail>=7.3,<7.4
    geoip2: geoip2

[testenv:coverage-report]
basepython = python3.12
deps = coverage
pip_pre = true
skip_install = true
commands =
    coverage report --include="src/**/" --omit="src/**/migrations/*.py"

[testenv:lint]
basepython = python3.12
deps = flake8==3.5.0
commands =
    flake8 src tests setup.py
    isort --diff src/ tests/

[testenv:format]
basepython = python3.12
deps =
    isort
    black
skip_install = true
commands =
    black --check --exclude=/migrations setup.py src/wagtail_personalisation/ tests/
