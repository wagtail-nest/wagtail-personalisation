[tox]
envlist =
    lint
    ; Django 5.2, supported Wagtail versions (LTS + latest)
    py{310,311,312,313}-dj52-wt{70,73,74}
    ; Django 6.0, supported Wagtail versions (Django 6.0 support was added in Wagtail 7.3)
    py{312,313,314}-dj60-wt{73,74}

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

[testenv]
basepython =
    py310: python3.10
    py311: python3.11
    py312: python3.12
    py313: python3.13
    py314: python3.14
commands = coverage run --parallel -m pytest -rs {posargs}
extras = test
deps =
    dj52: Django>=5.2,<5.3
    dj60: Django>=6.0,<6.1
    wt70: wagtail>=7.0,<7.1
    wt73: wagtail>=7.3,<7.4
    wt74: wagtail>=7.4rc1,<7.5
    geoip2: geoip2

[testenv:coverage-report]
basepython = python3.12
deps = coverage
pip_pre = true
skip_install = true
commands =
    coverage report --include="src/**/" --omit="src/**/migrations/*.py"

[testenv:lint]
basepython = python3.12
deps = flake8==3.5.0
commands =
    flake8 src tests
    isort --diff src/ tests/

[testenv:format]
basepython = python3.12
deps =
    isort
    black
skip_install = true
commands =
    black --check --exclude=/migrations src/wagtail_personalisation/ tests/
